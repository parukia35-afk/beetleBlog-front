  <path d="M42 28C38 24 35 24 35 24M58 28C62 24 65 24 65 24" stroke="#D4A373" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 鞘翅 (Wing Cases) - 像兩片重疊的葉子 -->
